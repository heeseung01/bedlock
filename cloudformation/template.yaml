AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CodeBuddy Agent - Serverless GitHub PR Review Bot

Resources:
  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: orchestrator.lambda_handler
      Runtime: python3.9
      CodeUri: ../lambda/
      MemorySize: 512
      Timeout: 90
      Environment:
        Variables:
          GITHUB_TOKEN: "YOUR_GITHUB_TOKEN_HERE"
      Events:
        WebhookApi:
          Type: Api
          Properties:
            Path: /webhook
            Method: post